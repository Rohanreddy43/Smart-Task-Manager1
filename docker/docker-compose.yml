version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smart-task-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - smart-task-manager-network

  # Backend Application
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smart-task-manager-backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=smart_task_manager
      - JWT_SECRET=your-jwt-secret-key-change-this-in-production
    volumes:
      - ../backend:/app
      - /app/target
      - /app/logs
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - smart-task-manager-network

  # Frontend Application
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: smart-task-manager-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - smart-task-manager-network

volumes:
  postgres_data:

networks:
  smart-task-manager-network:
    driver: bridge
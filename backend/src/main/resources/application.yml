# Application Configuration
spring:
  application:
    name: smart-task-manager-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_task_manager
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # Security Configuration
  security:
    cors:
      allowed-origins: 
        - "http://localhost:3000"
        - "http://localhost:3001"
        - "https://your-frontend-domain.com"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      allowed-headers: "*"
      allow-credentials: true
  
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # Cache Configuration
  cache:
    type: simple

# JWT Configuration
app:
  jwtSecret: ${JWT_SECRET:dev-default-jwt-secret-key-must-be-at-least-sixty-four-characters-long}
  jwtExpirationInMs: 86400000  # 24 hours

# Server Configuration
server:
  port: ${PORT:8080}

# Logging Configuration
logging:
  level:
    com.smarttaskmanager: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/smart-task-manager.log

# Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    disable-swagger-default-url: true
